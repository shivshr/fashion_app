name: fashion_app
description: A production-ready Flutter fashion e-commerce app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  firebase_messaging: ^15.0.0

  flutter_riverpod: ^2.5.1
  go_router: ^13.0.0

  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  carousel_slider: ^5.0.0
  shimmer: ^3.0.0
  pinput: ^5.0.2
  photo_view: ^0.15.0

  shared_preferences: ^2.2.3
  crypto: ^3.0.3
  intl: ^0.19.0
  uuid: ^4.3.3
  url_launcher: ^6.2.5
  razorpay_flutter: ^1.3.6

  # LOCATION PACKAGES
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/categories/
    - assets/animations/